<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --sky-blue-light: #8ecae6ff;
      --blue-green: #219ebcff;
      --deep-space-blue: #023047ff;
      --amber-flame: #ffb703ff;
      --princeton-orange: #fb8500ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans";
      background-color: var(--deep-space-blue);
      color: var(--princeton-orange);
    }

    section {
      width: 50%;
      min-height: max-content;
      border: 2px solid;
      border-radius: .5em;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 2em;
      padding: 3em;
      font-size: 1.3em;
    }

    form label {
      font-weight: 500;
    }

    input[type='text'],
    input[type='date'],
    input[type='email'] {
      font-size: 1em;
    }

    #gender label:first-child {
      margin-right: 1em;
    }

    form>div {
      display: flex;
      gap: .8em;
    }

    #checks {
      flex-direction: column;
    }

    #check-options {
      width: 100%;
      height: 5em;
      padding: .5em;
      display: flex;
      gap: .5em;
      align-items: flex-start;
      flex-wrap: wrap;
      flex-direction: column;
      font-size: 1em;
    }

    .medium-font-size {
      font-size: 1em;
    }

    #check-options input {
      width: 1.8em;
      height: 1em;
    }

    select {
      font-size: 1em;
      padding: .1em;
    }

    #selects {
      gap: 1em;
      align-items: center;
    }


    button {
      font-size: 1.3em;
      width: 40%;
      height: 45%;
      align-self: center;
      padding: .5em;
      border-radius: .3em;
      border: 1px solid black;
      color: var(--deep-space-blue);
      background-color: var(--princeton-orange);
      font-weight: 600;
    }

    button:hover {
      background-color: var(--amber-flame);
    }
  </style>
</head>

<body>
  <section>
    <form action="/generate-profile" method="post">
      <div>
        <label for="name">Name: </label><input type="text" name="name" id="name" required>
      </div>
      <div>
        <label for="email">Email: </label><input type="email" name="email" id="email" required>
      </div>
      <div>
        <label for="username">Username: </label>
        <input type="text" name="username" id="username">
      </div>
      <div>
        <label for="dob">DOB: </label><input type="date" name="dob" id="dob">
      </div>
      <div id="gender">
        <label for="male">Gender: </label>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male"> Male</label>
        <input type="radio" name="gender" value="female" id="female">
        <label for="female"> Female</label>
      </div>
      <div id="checks">
        <label for="">Hobbies: </label>
        <div id="check-options">
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="studying" id="studying">
            <label for="studying"> Studying</label>
          </article>
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="listening to music"
              id="listening_to_music">
            <label for="listening_to_music"> Listening to music</label>
          </article>
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="watching movies" id="watching_movies">
            <label for="watching_movies"> Watching Movies</label>
          </article>
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="drawing" id="drawing">
            <label for="drawing"> Drawing</label>
          </article>
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="playing" id="playing">
            <label for="playing"> Playing</label>
          </article>
          <article>
            <input type="checkbox" name="hobbies" class="medium-font-size" value="traveling" id="traveling">
            <label for="traveling"> Traveling</label>
          </article>
        </div>
      </div>
      <div id="selects">
        <label for="study">Currently Studying: </label>
        <select name="study" id="study">
          <option selected disabled>select you education level</option>
          <option value="middle">Middle school</option>
          <option value="10">10th standard</option>
          <option value="occasional">Occasional</option>
          <option value="diploma">Diploma</option>
          <option value="graduate">Graduate</option>
          <option value="post-graduate">Post-Graduate</option>
        </select>
      </div>
      <button type="submit">Submit</button>
    </form>
  </section>
</body>

</html>
