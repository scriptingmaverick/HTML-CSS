<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greet</title>
</head>
<body>
  <main>
    <section>
      <header>
        <h3>Greeting</h3>
      </header>
      <form action="/greet" method="post">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="Name" name="username" value="myname">
        </div>
        <div>
          <label for="email">Email</label>
          <input type="text" id="email" required placeholder="email" name="email">
        </div>
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
</body>
</html>
